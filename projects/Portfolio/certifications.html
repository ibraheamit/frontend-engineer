<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certifications — Henry Clark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        /* ── RESET & TOKENS ─────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #111114;
            --bg2: #1a1a1e;
            --card: #1e1e22;
            --card2: #232328;
            --accent: #2ec4f3;
            --text: #fff;
            --muted: #8888a0;
            --border: #2a2a32;
            --radius: 14px;
            --px: clamp(16px, 4.5vw, 80px);
            --max: 1280px;
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px
        }

        a {
            text-decoration: none;
            color: inherit
        }

        .wrap {
            width: 100%;
            max-width: var(--max);
            margin-inline: auto;
            padding-inline: var(--px)
        }

        /* ── NAV ──────────────────────────── */
        nav {
            position: sticky;
            top: 0;
            z-index: 600;
            background: rgba(17, 17, 20, .9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            width: 100%;
            max-width: var(--max);
            margin-inline: auto;
            padding-inline: var(--px);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1rem
        }

        .nav-logo img {
            width: 38px;
            height: 38px
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: .82rem;
            font-weight: 600;
            color: var(--muted);
            transition: color .2s;
        }

        .nav-back:hover {
            color: var(--accent)
        }

        .nav-back svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        /* ── PAGE HEADER ────────────────────── */
        .page-header {
            padding-block: clamp(40px, 6vw, 80px) clamp(28px, 4vw, 48px);
            position: relative;
            overflow: hidden
        }

        .ph-inner {
            position: relative;
            z-index: 1
        }

        .ph-tag {
            font-size: .7rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .ph-tag::before {
            content: '';
            width: 24px;
            height: 2px;
            background: var(--accent);
            border-radius: 1px
        }

        .ph-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px
        }

        .ph-titles h1 {
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 900;
            letter-spacing: -1.5px;
            line-height: 1.05;
        }

        .ph-titles h1 span {
            color: var(--muted);
            font-weight: 400
        }

        .ph-titles p {
            font-size: .95rem;
            color: var(--muted);
            margin-top: 10px;
            max-width: 480px;
            line-height: 1.7
        }

        /* stats pills */
        .ph-stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex-shrink: 0
        }

        .ph-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            min-width: 80px;
        }

        .ph-stat-num {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ph-stat-lbl {
            font-size: .62rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .8px;
            text-transform: uppercase;
            margin-top: 2px
        }

        /* ── MOBILE PAGE HEADER ─────────────── */
        @media(max-width:600px) {
            .page-header {
                padding-block: 32px 24px
            }

            .ph-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .ph-titles h1 {
                font-size: 2rem;
                letter-spacing: -1px;
            }

            .ph-titles p {
                font-size: .85rem;
                margin-top: 8px;
            }

            /* stat pill becomes a horizontal bar */
            .ph-stats {
                width: 100%;
            }

            .ph-stat {
                flex: 1;
                flex-direction: row;
                align-items: center;
                justify-content: flex-start;
                gap: 10px;
                padding: 14px 18px;
                border-radius: 12px;
                background: var(--card);
                border: 1px solid var(--border);
            }

            .ph-stat-num {
                font-size: 1.8rem;
                letter-spacing: -1px;
            }

            .ph-stat-lbl {
                font-size: .72rem;
                letter-spacing: .5px;
                margin-top: 0;
                color: var(--muted);
            }
        }

        /* ── CONTROLS ────────────────────────── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            padding-bottom: clamp(24px, 3vw, 36px);
        }

        /* search */
        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 340px;
        }

        .search-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            stroke: var(--muted);
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 9px 16px 9px 38px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .85rem;
            outline: none;
            transition: border-color .25s, box-shadow .25s;
        }

        .search-input:focus {
            border-color: rgba(46, 196, 243, .4);
            box-shadow: 0 0 0 3px rgba(46, 196, 243, .08)
        }

        .search-input::placeholder {
            color: var(--muted)
        }

        /* filter pills */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .filter-btn {
            padding: 7px 16px;
            border-radius: 50px;
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .3px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .22s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover {
            border-color: rgba(46, 196, 243, .3);
            color: var(--text)
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #111
        }

        /* ── CERTS GRID ──────────────────────── */
        .certs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            padding-bottom: clamp(48px, 6vw, 80px);
        }

        /* ── CERT CARD ───────────────────────── */
        .cert-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            transition: transform .34s cubic-bezier(.4, 0, .2, 1),
                border-color .3s, box-shadow .3s;
        }

        .cert-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            z-index: 2;
            background: linear-gradient(90deg, transparent, rgba(46, 196, 243, .5), transparent);
            opacity: 0;
            transition: opacity .35s;
        }

        .cert-card:hover {
            transform: translateY(-7px);
            border-color: rgba(46, 196, 243, .28);
            box-shadow: 0 24px 60px rgba(0, 0, 0, .5), 0 0 32px rgba(46, 196, 243, .07);
        }

        .cert-card:hover::before {
            opacity: 1
        }

        /* image banner */
        .cert-img-wrap {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative;
            background: var(--bg2)
        }

        .cert-img-wrap svg,
        .cert-img-wrap img {
            width: 100%;
            height: 100%;
            display: block;
            transition: transform .5s cubic-bezier(.4, 0, .2, 1)
        }

        .cert-card:hover .cert-img-wrap svg,
        .cert-card:hover .cert-img-wrap img {
            transform: scale(1.04)
        }

        .cert-img-chip {
            position: absolute;
            bottom: 10px;
            left: 12px;
            z-index: 2;
            background: rgba(10, 10, 14, .8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 50px;
            padding: 4px 12px;
            font-size: .68rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            letter-spacing: .3px;
        }

        .cert-hover-overlay {
            position: absolute;
            inset: 0;
            z-index: 3;
            background: rgba(0, 0, 0, .5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .3s;
        }

        .cert-card:hover .cert-hover-overlay {
            opacity: 1
        }

        .cert-hover-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 20px;
            border-radius: 50px;
            background: var(--accent);
            color: #111;
            font-size: .8rem;
            font-weight: 700;
            transform: translateY(8px);
            transition: transform .3s;
        }

        .cert-card:hover .cert-hover-btn {
            transform: translateY(0)
        }

        /* info area */
        .cert-info {
            padding: 18px 20px 20px;
            display: flex;
            flex-direction: column;
            flex: 1
        }

        .cert-name {
            font-size: .97rem;
            font-weight: 700;
            line-height: 1.38;
            margin-bottom: 6px
        }

        .cert-org {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .78rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .cert-org-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0
        }

        .cert-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 13px;
            border-top: 1px solid rgba(255, 255, 255, .06);
            margin-top: auto;
        }

        .cert-date {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .7rem;
            color: var(--muted);
            font-family: 'Courier New', monospace;
        }

        .cert-date svg {
            width: 12px;
            height: 12px;
            stroke: var(--muted);
            stroke-width: 1.8;
            fill: none;
            flex-shrink: 0;
            stroke-linecap: round
        }

        .cert-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: .7px;
            padding: 4px 10px;
            border-radius: 50px;
            background: rgba(46, 196, 243, .09);
            border: 1px solid rgba(46, 196, 243, .22);
            color: var(--accent);
            text-transform: uppercase;
            transition: all .25s;
        }

        .cert-badge::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0
        }

        .cert-card:hover .cert-badge {
            background: rgba(46, 196, 243, .18);
            border-color: rgba(46, 196, 243, .4)
        }

        /* expired badge variant */
        .cert-badge.expired {
            background: rgba(248, 113, 113, .08);
            border-color: rgba(248, 113, 113, .22);
            color: #f87171;
        }

        .cert-badge.expired::before {
            background: #f87171
        }

        /* no results */
        .no-results {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: .95rem;
        }

        .no-results svg {
            width: 48px;
            height: 48px;
            stroke: var(--border);
            fill: none;
            stroke-width: 1.5;
            margin: 0 auto 16px;
            display: block;
        }

        /* ── MODAL ───────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 900;
            background: rgba(5, 5, 8, .85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity .3s, visibility .3s;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 22px;
            width: 100%;
            max-width: 720px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(18px) scale(.97);
            transition: transform .35s cubic-bezier(.4, 0, .2, 1);
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .modal::-webkit-scrollbar {
            width: 3px
        }

        .modal::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px
        }

        .modal-overlay.open .modal {
            transform: translateY(0) scale(1)
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 10;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .22s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, .15);
            border-color: rgba(255, 255, 255, .25)
        }

        .modal-close svg {
            width: 15px;
            height: 15px;
            stroke: var(--text);
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round
        }

        /* modal image */
        .modal-img {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 22px 22px 0 0;
            overflow: hidden;
            background: var(--bg);
        }

        .modal-img svg,
        .modal-img img {
            width: 100%;
            height: 100%;
            display: block
        }

        /* modal body */
        .modal-body {
            padding: 26px 30px 32px
        }

        .modal-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
            flex-wrap: wrap
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -.5px;
            line-height: 1.2
        }

        .modal-cred-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: 50px;
            background: var(--accent);
            border: none;
            color: #111;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all .22s;
        }

        .modal-cred-btn:hover {
            box-shadow: 0 6px 24px rgba(46, 196, 243, .35);
            transform: translateY(-2px)
        }

        .modal-cred-btn svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .modal-org {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: .85rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 18px;
        }

        .modal-org-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent)
        }

        .modal-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            font-size: .75rem;
            font-weight: 600;
            color: var(--muted);
        }

        .meta-chip svg {
            width: 13px;
            height: 13px;
            stroke: var(--muted);
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round
        }

        .modal-section-lbl {
            font-size: .65rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .modal-about {
            font-size: .88rem;
            color: #c0c0d0;
            line-height: 1.8;
            margin-bottom: 22px
        }

        /* skills gained */
        .modal-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 22px
        }

        .skill-chip {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 600;
            background: rgba(46, 196, 243, .07);
            border: 1px solid rgba(46, 196, 243, .18);
            color: var(--accent);
        }

        .modal-divider {
            height: 1px;
            background: rgba(255, 255, 255, .07);
            margin: 18px 0
        }

        /* ── MOBILE BOTTOM NAV ──────────────── */
        .bottom-nav {
            display: none
        }

        @media(max-width:768px) {
            body {
                padding-bottom: 70px
            }

            .bottom-nav {
                display: block;
                position: fixed;
                bottom: 0 !important;
                top: auto !important;
                left: 0;
                right: 0;
                z-index: 9999;
                background: rgba(14, 14, 18, .96);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border-top: 1px solid rgba(255, 255, 255, .1);
                border-bottom: none;
                padding-bottom: env(safe-area-inset-bottom, 8px);
                box-shadow: 0 -8px 32px rgba(0, 0, 0, .4);
            }
        }

        .bottom-nav-inner {
            display: flex;
            align-items: stretch;
            justify-content: space-around;
            height: 62px
        }

        .bn-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: .6rem;
            font-weight: 600;
            letter-spacing: .5px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0 4px;
            position: relative;
            transition: color .2s;
            -webkit-tap-highlight-color: transparent;
        }

        .bn-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 24px;
            height: 2px;
            background: var(--accent);
            border-radius: 0 0 3px 3px;
            transition: transform .25s cubic-bezier(.34, 1.56, .64, 1);
        }

        .bn-item.active::after {
            transform: translateX(-50%) scaleX(1)
        }

        .bn-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .bn-item.active {
            color: var(--accent)
        }

        .bn-item.active svg {
            stroke: var(--accent)
        }

        /* ── RESPONSIVE ───────────────────── */
        @media(max-width:960px) {
            .certs-grid {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:560px) {
            .certs-grid {
                grid-template-columns: 1fr
            }

            .modal-body {
                padding: 20px 20px 26px
            }

            .modal-title {
                font-size: 1.2rem
            }

            .controls {
                flex-direction: column;
                align-items: flex-start
            }

            .search-wrap {
                max-width: 100%;
                width: 100%
            }
        }

        /* reveal */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity .6s ease, transform .6s ease
        }

        .reveal.in {
            opacity: 1;
            transform: translateY(0)
        }

        .d1 {
            transition-delay: .07s
        }

        .d2 {
            transition-delay: .14s
        }

        .d3 {
            transition-delay: .21s
        }

        .d4 {
            transition-delay: .28s
        }

        .d5 {
            transition-delay: .35s
        }

        .d6 {
            transition-delay: .42s
        }

        .page-header,
        .controls {
            opacity: 1 !important;
            transform: none !important
        }
    </style>
</head>

        /* ══ BUILD SVG CERTIFICATE IMAGE ══════════════════════════ */
        function buildCertSvg(c, size) {
            var w = size === 'sm' ? 480 : 600;
            var h = size === 'sm' ? 270 : 338;
            var g1 = c.svgGradient[0], g2 = c.svgGradient[1];
            var acc = c.svgAccent;
            var uid = 'g' + c.id;
            return '<svg width="100%" height="100%" viewBox="0 0 ' + w + ' ' + h + '" xmlns="http://www.w3.org/2000/svg">' +
                '<defs>' +
                '<linearGradient id="' + uid + 'a" x1="0%" y1="0%" x2="100%" y2="100%">' +
                '<stop offset="0%" stop-color="' + g1 + '"/>' +
                '<stop offset="100%" stop-color="' + g2 + '"/>' +
                '</linearGradient>' +
                '<pattern id="' + uid + 'p" width="20" height="20" patternUnits="userSpaceOnUse">' +
                '<circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.055)"/>' +
                '</pattern>' +
                '</defs>' +
                '<rect width="' + w + '" height="' + h + '" fill="url(#' + uid + 'a)"/>' +
                '<rect width="' + w + '" height="' + h + '" fill="url(#' + uid + 'p)"/>' +
                '<rect x="12" y="12" width="' + (w - 24) + '" height="' + (h - 24) + '" rx="6" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>' +
                '<rect x="20" y="20" width="' + (w - 40) + '" height="' + (h - 40) + '" rx="4" fill="none" stroke="' + acc + '" stroke-opacity="0.15" stroke-width="1"/>' +
                /* decorative corner */
                '<line x1="12" y1="50" x2="12" y2="12" stroke="' + acc + '" stroke-width="3" stroke-opacity=".6"/>' +
                '<line x1="12" y1="12" x2="50" y2="12" stroke="' + acc + '" stroke-width="3" stroke-opacity=".6"/>' +
                '<line x1="' + (w - 12) + '" y1="' + (h - 50) + '" x2="' + (w - 12) + '" y2="' + (h - 12) + '" stroke="' + acc + '" stroke-width="3" stroke-opacity=".6"/>' +
                '<line x1="' + (w - 12) + '" y1="' + (h - 12) + '" x2="' + (w - 50) + '" y2="' + (h - 12) + '" stroke="' + acc + '" stroke-width="3" stroke-opacity=".6"/>' +
                /* icon */
                '<text x="50%" y="42%" text-anchor="middle" fill="' + acc + '" font-family="monospace,Arial" font-size="' + (size === 'sm' ? '34' : '44') + '" font-weight="900" opacity=".85">' + c.svgIcon + '</text>' +
                /* title */
                '<text x="50%" y="61%" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="' + (size === 'sm' ? '12' : '14') + '" font-weight="700" letter-spacing="1.5">CERTIFICATE OF COMPLETION</text>' +
                '<text x="50%" y="74%" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Arial,sans-serif" font-size="' + (size === 'sm' ? '10' : '12') + '">' + c.svgLabel + '</text>' +
                /* stars */
                '<text x="50%" y="88%" text-anchor="middle" fill="' + acc + '" font-size="10" opacity=".7">★  ★  ★  ★  ★</text>' +
                '</svg>';
        }

        /* ══ RENDER GRID ══════════════════════════════════════════ */
        function renderGrid(filter, query) {
            var grid = document.getElementById('certsGrid');
            grid.innerHTML = '';

            var list = certs.filter(function (c) {
                var matchCat = filter === 'all' || c.cats.indexOf(filter) !== -1;
                var matchQ = !query || c.name.toLowerCase().indexOf(query) !== -1 ||
                    c.org.toLowerCase().indexOf(query) !== -1;
                return matchCat && matchQ;
            });

            if (list.length === 0) {
                grid.innerHTML = '<div class="no-results">' +
                    '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>' +
                    'No certifications found. Try a different search or filter.' +
                    '</div>';
                return;
            }

            list.forEach(function (c, i) {
                var card = document.createElement('div');
                card.className = 'cert-card reveal d' + (i % 6);
                card.dataset.id = c.id;
                var badgeClass = c.status === 'expired' ? 'cert-badge expired' : 'cert-badge';
                var badgeTxt = c.status === 'expired' ? 'Expired' : 'Verified';
                card.innerHTML =
                    '<div class="cert-img-wrap">' +
                    '<img src="' + c.img + '" alt="' + c.name + '" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block"/>' +
                    '<div class="cert-hover-overlay"><div class="cert-hover-btn">View Details</div></div>' +
                    '<div class="cert-img-chip">' + c.org + '</div>' +
                    '</div>' +
                    '<div class="cert-info">' +
                    '<div class="cert-name">' + c.name + '</div>' +
                    '<div class="cert-org"><span class="cert-org-dot"></span>' + c.org + '</div>' +
                    '<div class="cert-footer">' +
                    '<div class="cert-date">' +
                    '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
                    c.date +
                    '</div>' +
                    '<span class="' + badgeClass + '">' + badgeTxt + '</span>' +
                    '</div>' +
                    '</div>';
                grid.appendChild(card);
            });

            observeReveals();
        }

        /* ══ STATS COUNTERS ═══════════════════════════════════════ */
        function animateCount(el, target) {
            var v = 0, step = target / 50;
            var t = setInterval(function () {
                v = Math.min(v + step, target);
                el.textContent = Math.round(v);
                if (v >= target) clearInterval(t);
            }, 18);
        }
        animateCount(document.getElementById('totalCount'), certs.length);

                document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });

                activeFilter = btn.dataset.filter;
                renderGrid(activeFilter, activeQuery);
            });
        });

        document.getElementById('searchInput').addEventListener('input', function () {
            activeQuery = this.value.toLowerCase().trim();

                '<div class="meta-chip"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' +
                (c.status === 'verified' ? 'Verified' : 'Expired') +
                '</div>' +
                '<div class="meta-chip"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' +
                c.cats.join(' · ') +
                '</div>';

            /* about */
            document.getElementById('modalAbout').textContent = c.about;

            /* skills */
            document.getElementById('modalSkills').innerHTML =
                c.skills.map(function (s) { return '<span class="skill-chip">' + s + '</span>'; }).join('');

            /* cert id */
            document.getElementById('modalId').textContent = c.certId;

            overlay.classList.add('open');
            document.getElementById('modalBox').scrollTop = 0;
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('certsGrid').addEventListener('click', function (e) {
            var card = e.target.closest('.cert-card[data-id]');
            if (card) openModal(parseInt(card.dataset.id));
        });
        document.getElementById('modalClose').addEventListener('click', closeModal);
        overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

        /* ══ REVEAL ═══════════════════════════════════════════════ */
        function observeReveals() {
            setTimeout(function () {
                document.querySelectorAll('.reveal').forEach(function (el) { el.classList.add('in'); });
            }, 500);
            if ('IntersectionObserver' in window) {
                var obs = new IntersectionObserver(function (entries) {
                    entries.forEach(function (e) {
                        if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
                    });
                }, { threshold: 0, rootMargin: '0px 0px -20px 0px' });
                document.querySelectorAll('.reveal:not(.in)').forEach(function (el) { obs.observe(el); });
            }
        }

        /* ══ INIT ═════════════════════════════════════════════════ */
        renderGrid('all', '');
    </script>
</body>
