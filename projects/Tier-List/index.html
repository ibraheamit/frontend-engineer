<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ قوائم التصنيف - Tier List Maker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🏆 منشئ قوائم التصنيف</h1>

        <div class="controls">
            <button class="btn" onclick="uploadImages()">📌 إضافة صور</button>
            <button class="btn btn-secondary" onclick="addNewTier()">➕ إضافة صف جديد</button>
            <button class="btn btn-secondary" onclick="resetAll()">🔄 إعادة تعيين</button>
        </div>

        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileSelect(event)">

        <div class="unranked-area">
            <div class="unranked-title">📦 صور غير مصنفة</div>
            <div class="unranked-content" id="unrankedArea"></div>
        </div>

        <div class="tier-list" id="tierList"></div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2 class="modal-title">⚙️ إعدادات الصف</h2>
            <div class="form-group">
                <label>اسم الصف:</label>
                <input type="text" id="tierNameInput">
            </div>
            <div class="form-group">
                <label>لون الصف:</label>
                <input type="color" id="tierColorInput">
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveTierSettings()">حفظ</button>
                <button class="btn-delete" onclick="deleteTier()">حذف الصف</button>
                <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
